role: scout
adapter: cursor
prompt_template: scout.md
default_intent: intake
params:
  output_format: stream-json
  trust: true
  force: true
  plan: false
worktree: false
subscribes:
  - type: SIGNAL
    kind: feature.requested
    dispatch: direct
publishes:
  - type: SIGNAL
    kind: feature.classified
  - type: INSIGHT
    kind: task.plan
  - type: SIGNAL
    kind: task.ready
