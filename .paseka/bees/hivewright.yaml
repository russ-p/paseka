role: hivewright
adapter: cursor
system_template: hivewright-system.md
prompt_template: hivewright-task.md
params:
  model: grok-4.5-medium
  output_format: stream-json
  trust: true
  force: true
worktree: false
publishes:
  - type: MUTATION
    kind: code.proposal.root
  - type: INSIGHT
    kind: run.summary
  - type: INSIGHT
    kind: context.note
