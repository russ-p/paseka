role: hivewright
adapter: cursor
prompt_template: hivewright.md
params:
  model: composer-2.5
  output_format: stream-json
  trust: true
  force: true
worktree: true
publishes:
  - type: MUTATION
    kind: code.proposal
  - type: INSIGHT
    kind: run.summary
  - type: INSIGHT
    kind: context.note
