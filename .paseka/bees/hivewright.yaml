role: hivewright
adapter: cursor
prompt_template: hivewright.md
params:
  model: grok-4.5-medium
  output_format: stream-json
  trust: true
  force: true
worktree: false
publishes:
  - type: MUTATION
    kind: code.proposal
  - type: INSIGHT
    kind: run.summary
  - type: INSIGHT
    kind: context.note
