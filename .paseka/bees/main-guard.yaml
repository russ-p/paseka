role: main-guard
adapter: cursor
prompt_template: main-guard.md
params:
  model: gpt-5.5-medium
  output_format: stream-json
  trust: true
  force: true
worktree: false
subscribes:
  - type: MUTATION
    kind: code.proposal.root
    dispatch: direct
publishes:
  - type: VERIFICATION
    kind: verification.success
  - type: VERIFICATION
    kind: verification.failed
  - type: INSIGHT
    kind: review.note
completion_contract:
  required:
    - type: VERIFICATION
      kind_one_of:
        - verification.success
        - verification.failed
      count: 1
