<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Queen Console">
  <rect width="64" height="64" rx="12" fill="#0f1117"/>
  <!-- wings -->
  <path d="M10 22 L28 30 L12 38 Z" fill="#171a22" stroke="#6ea8ff" stroke-width="1.4"/>
  <path d="M54 22 L36 30 L52 38 Z" fill="#171a22" stroke="#6ea8ff" stroke-width="1.4"/>
  <path d="M8 34 L26 36 L12 46 Z" fill="#1c2230" stroke="#3a6fb0" stroke-width="1"/>
  <path d="M56 34 L38 36 L52 46 Z" fill="#1c2230" stroke="#3a6fb0" stroke-width="1"/>
  <!-- circuit traces on wings -->
  <path d="M14 28 L22 31 M16 34 L22 35" stroke="#6ea8ff" stroke-width="0.9" opacity="0.85"/>
  <path d="M50 28 L42 31 M48 34 L42 35" stroke="#6ea8ff" stroke-width="0.9" opacity="0.85"/>
  <!-- abdomen stripes -->
  <ellipse cx="32" cy="46" rx="9" ry="11" fill="#171a22" stroke="#2a3040" stroke-width="1.2"/>
  <path d="M24.5 42 H39.5" stroke="#f0c14b" stroke-width="2.2"/>
  <path d="M25 48 H39" stroke="#f0c14b" stroke-width="2.2"/>
  <path d="M32 36 V56" stroke="#6ea8ff" stroke-width="1.1" opacity="0.9"/>
  <!-- thorax -->
  <circle cx="32" cy="30" r="8.5" fill="#1a1f2a" stroke="#6ea8ff" stroke-width="1.6"/>
  <path d="M27 28 H37 M29 32 H35" stroke="#6ea8ff" stroke-width="1" opacity="0.85"/>
  <circle cx="29" cy="27" r="1.1" fill="#5fd38d"/>
  <circle cx="35" cy="27" r="1.1" fill="#5fd38d"/>
  <!-- head -->
  <ellipse cx="32" cy="18" rx="7" ry="6.5" fill="#171a22" stroke="#6ea8ff" stroke-width="1.4"/>
  <!-- honeycomb eyes -->
  <polygon points="27.5,16 29.5,15 31,16.5 29.5,18.5 27.5,17.5" fill="#6ea8ff"/>
  <polygon points="33,16.5 34.5,15 36.5,16 36.5,17.5 34.5,18.5" fill="#6ea8ff"/>
  <!-- antennae -->
  <path d="M27 13 L23 7" stroke="#8b95a8" stroke-width="1.3" stroke-linecap="round"/>
  <path d="M37 13 L41 7" stroke="#8b95a8" stroke-width="1.3" stroke-linecap="round"/>
  <circle cx="23" cy="7" r="1.6" fill="#6ea8ff"/>
  <circle cx="41" cy="7" r="1.6" fill="#6ea8ff"/>
  <!-- legs -->
  <path d="M24 34 L16 40 M24 38 L17 46 M40 34 L48 40 M40 38 L47 46"
        stroke="#8b95a8" stroke-width="1.3" stroke-linecap="round" fill="none"/>
  <circle cx="16" cy="40" r="1" fill="#5fd38d"/>
  <circle cx="17" cy="46" r="1" fill="#5fd38d"/>
  <circle cx="48" cy="40" r="1" fill="#5fd38d"/>
  <circle cx="47" cy="46" r="1" fill="#5fd38d"/>
</svg>
