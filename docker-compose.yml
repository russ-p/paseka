services:
  nats:
    image: nats:2.11
    ports:
      - "4222:4222" # client (matches paseka init default: nats://127.0.0.1:4222)
      - "8222:8222" # HTTP monitoring — curl http://127.0.0.1:8222/jsz
    command:
      - "-js"
      - "-sd"
      - "/data"
      - "-m"
      - "8222"
    volumes:
      - nats-data:/data

  nats-ui:
    image: ghcr.io/nats-nui/nui:0.9.3
    container_name: nui-web
    ports:
      - "31311:31311" # Web UI access port
    volumes:
      - nui-db:/db
    depends_on:
      - nats

volumes:
  nats-data:
  nui-db:
