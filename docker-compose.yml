services:
  nats:
    image: nats:2.11
    ports:
      - "4222:4222" # client (matches paseka init default: nats://127.0.0.1:4222)
      - "8222:8222" # HTTP monitoring — curl http://127.0.0.1:8222/jsz
    command:
      - "-js"
      - "-sd"
      - "/data"
      - "-m"
      - "8222"
    volumes:
      - nats-data:/data

volumes:
  nats-data:
